server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Allow file uploads up to 25 MB (reports / image uploads)
    client_max_body_size 25m;

    # Gzip pre-compressed assets produced by vite-plugin-compression
    gzip_static on;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Reverse-proxy Django endpoints to the backend container
    location ~ ^/(api|admin|media|static|health)/ {
        proxy_pass http://axflow-backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Cache static assets aggressively (Vite hashes filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: anything else returns index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
