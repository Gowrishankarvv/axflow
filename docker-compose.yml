# version: '3.9'
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      DJANGO_SECRET_KEY: dev-secret
      DEBUG: "1"
      ALLOWED_HOSTS: localhost,127.0.0.1
      ALLOWED_EMAIL_DOMAINS: Axinortech.com
      PORT: 8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; req=urllib.request.Request('http://localhost:8000/health/', headers={'X-Forwarded-Proto':'https'}); urllib.request.urlopen(req, timeout=3).read()"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    command: bash -c "python manage.py migrate && gunicorn app:application --bind 0.0.0.0:8000 --workers 1 --threads 2 --timeout 120 --max-requests 1000 --max-requests-jitter 50"
  frontend:
    working_dir: /app
    image: node:20
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: bash -c "npm install && npm run dev -- --host --port 5173"
    depends_on:
      backend:
        condition: service_healthy
