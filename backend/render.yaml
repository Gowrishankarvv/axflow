services:
  - type: web
    name: timetrack-backend
    env: docker
    build:
      context: .
      dockerfile: Dockerfile
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://time-tracker-0l1v.onrender.com,http://localhost:5173,http://127.0.0.1:5173"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://time-tracker-0l1v.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: timetrack-db
          property: connectionString
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@example.com
      - key: DJANGO_SUPERUSER_PASSWORD
        generateValue: true
      - key: USE_S3
        value: "true"
      - key: SUPABASE_STORAGE_BUCKET_NAME
        value: "client_logos"
      - key: SUPABASE_S3_ENDPOINT_URL
        value: "https://sroddbyojcclzvszolka.storage.supabase.co/storage/v1/s3"
      - key: SUPABASE_S3_REGION_NAME
        value: "ap-south-1"
      - key: SUPABASE_ACCESS_KEY_ID
        sync: false
      - key: SUPABASE_SECRET_ACCESS_KEY
        sync: false
    autoDeploy: true
    healthCheckPath: /
    ports:
      - type: http
        port: 8000

  - type: web
    name: timetrack-frontend
    env: node
    build:
      context: ../frontend
    envVars:
      - key: VITE_API_URL
        value: example.com  # points to backend service
    buildCommand: npm install && npm run build
    startCommand: npx serve -s dist -l 3000
    staticPublishPath: dist
    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    ports:
      - type: http
        port: 3000

databases:
  - name: timetrack-db
    databaseName: timetrack
    user: timetrack
